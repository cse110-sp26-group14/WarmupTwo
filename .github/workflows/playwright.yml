name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: slot-machine
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
        cache: npm
        cache-dependency-path: slot-machine/package-lock.json
    - name: Install dependencies
      run: npm ci
    - name: Run JS syntax checks
      run: npm run check:js
    - name: Run unit tests
      run: npm test
    - name: Install Playwright Browsers
      if: ${{ hashFiles('slot-machine/playwright.config.*') != '' }}
      run: npx playwright install --with-deps
    - name: Run Playwright tests
      if: ${{ hashFiles('slot-machine/playwright.config.*') != '' }}
      run: npx playwright test
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() && hashFiles('slot-machine/playwright.config.*') != '' }}
      with:
        name: playwright-report
        path: slot-machine/playwright-report/
        retention-days: 30
